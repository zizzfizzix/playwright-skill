name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          command: manifest
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created }}
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Sync plugin.json and marketplace.json versions
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('.release-please-manifest.json', 'utf8'));
          const marketplace = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));

          for (const [pkgPath, version] of Object.entries(manifest)) {
            const pluginName = pkgPath.split('/').pop();
            const tag = `${pluginName}-v${version}`;

            // Update plugin.json version
            const pluginJsonPath = `${pkgPath}/.claude-plugin/plugin.json`;
            if (fs.existsSync(pluginJsonPath)) {
              const pluginJson = JSON.parse(fs.readFileSync(pluginJsonPath, 'utf8'));
              if (pluginJson.version !== version) {
                pluginJson.version = version;
                fs.writeFileSync(pluginJsonPath, JSON.stringify(pluginJson, null, 2) + '\n');
                console.log(`Updated ${pluginName} plugin.json version → ${version}`);
              }
            }

            // Update marketplace.json version and source.ref
            const plugin = marketplace.plugins.find(p => p.name === pluginName);
            if (plugin) {
              if (plugin.version !== version) {
                plugin.version = version;
                console.log(`Updated ${pluginName} marketplace version → ${version}`);
              }
              if (plugin.source && typeof plugin.source === 'object' && plugin.source.ref !== tag) {
                plugin.source.ref = tag;
                console.log(`Pinned ${pluginName} source.ref → ${tag}`);
              }
            }
          }

          fs.writeFileSync('.claude-plugin/marketplace.json', JSON.stringify(marketplace, null, 2) + '\n');
          EOF

      - name: Commit version sync
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "all versions already up to date"
          else
            git commit -m "chore: sync plugin.json and marketplace.json versions to release tags"
            git push
          fi
